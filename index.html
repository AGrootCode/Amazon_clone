<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Amazon</title>
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="nav-logo border">
          <div class="logo"></div>
        </div>

        <div class="nav-add border">
          <p class="nav-add-first">Deliver to</p>
          <div class="nav-add-icon">
            <i class="fa-solid fa-location-dot"></i>
            <p class="nav-add-second">India</p>
          </div>
        </div>

        <div class="nav-search border">
          <select name="category" class="nav-search-select">
            <option value="All">All</option>
          </select>
          <input
            type="text"
            placeholder="Search Amazon"
            class="nav-search-input"
          />
          <div class="nav-search-icon">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
        </div>

        <div class="nav-signin border">
          <p class="nav-signin first">Hello, sign in</p>
          <p class="nav-signin second">Accounts & Lists</p>
        </div>

        <div class="nav-return border">
          <p class="nav-return first">Returns</p>
          <p class="nav-return second">& Orders</p>
        </div>

        <div class="nav-cart border">
          <i class="fa-solid fa-cart-shopping"></i>
          Cart
        </div>
      </div>

      <!-- PANEL -->
      <div class="panel">
        <div class="panel-all border">
          <i class="fa-solid fa-bars"></i>
          All
        </div>

        <div class="panel-options">
          <p class="border">Today's deals</p>
          <p class="border">Customer Service</p>
          <p class="border">Registry</p>
          <p class="border">Gift cards</p>
          <p class="border">Sell</p>
        </div>

        <div class="panel-deals border">Shop deals in Electronics</div>
      </div>
    </header>

    <!--  HERO-SECTION -->
    <div class="hero-section"></div>
  </body>
</html>
